<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Examly Automation</title>
  <style>
    body {
      width: 250px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 15px;
      background-color: #f8f9fa;
      color: #333;
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
      text-align: center;
      color: #2c3e50;
    }
    button {
      display: block;
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #2980b9;
    }
    button:active {
      background-color: #1c638e;
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      color: #7f8c8d;
    }
    .settings-group {
      margin-top: 15px;
      padding-top: 10px;
      border-top: 1px solid #ddd;
    }
    .settings-group label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 5px;
      color: #2c3e50;
    }
    .settings-group input {
      width: calc(100% - 16px);
      padding: 6px;
      margin-bottom: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    #save-btn {
      background-color: #2ecc71;
    }
    #save-btn:hover {
      background-color: #27ae60;
    }
  </style>
</head>
<body>
  <h2>Examly Automation</h2>
  <button id="start-btn">Start Automation</button>
  <button id="inspect-btn">Inspect Page Info</button>
  <div id="status">Ready</div>

  <div class="settings-group">
    <label for="api-key">Gemini API Key (For Tests):</label>
    <input type="password" id="api-key" placeholder="Enter API Key" />
    <button id="save-btn">Save Key</button>
    <div style="text-align: center; margin-top: 10px; font-size: 14px; font-weight: bold;">
      <span style="color: black;">HEMS</span><span style="color: green;">.</span>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
