<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Examly Automation</title>
  <style>
    body {
      width: 250px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 15px;
      background-color: #f8f9fa;
      color: #333;
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
      text-align: center;
      color: #2c3e50;
    }
    button {
      display: block;
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #2980b9;
    }
    button:active {
      background-color: #1c638e;
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      color: #7f8c8d;
    }
  </style>
</head>
<body>
  <h2>Examly Automation</h2>
  <button id="start-btn">Start Automation</button>
  <button id="inspect-btn">Inspect Page Info</button>
  <div id="status">Ready</div>
  <script src="popup.js"></script>
</body>
</html>
